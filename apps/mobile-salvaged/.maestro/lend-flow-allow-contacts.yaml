appId: ${APP_ID}
---
# Lend Flow — Contacts Permission "Allow" Path

- runFlow: "login.yaml"

# Navigate to Lend tab (coordinate tap)
- tapOn:
    point: "37%,96%"
- extendedWaitUntil:
    visible: "Who are you lending to?"
    timeout: 8000

# Grant contacts permission if dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Verify "Add new contact" row is available
- assertVisible:
    id: "add-new-contact-row"

# Manual contact entry (test devices may have no real contacts)
- tapOn:
    id: "add-new-contact-row"
- extendedWaitUntil:
    visible: "First & last name"
    timeout: 5000
- tapOn:
    id: "manual-contact-name-input"
- inputText: "Test Borrower"
- tapOn:
    id: "manual-contact-phone-input"
- inputText: "5551234567"
- pressKey: enter
- scroll
- tapOn: "Use this contact"

# Item entry
- extendedWaitUntil:
    visible: "What?"
    timeout: 8000
- tapOn:
    id: "item-input-title"
- inputText: "Drill"

# Timeframe
- tapOn:
    id: "timeframe-chip-2weeks"

# Preview
- tapOn:
    id: "lend-preview-button"
- extendedWaitUntil:
    visible: "Preview message"
    timeout: 5000

# Send
- tapOn:
    id: "sms-preview-send"

# Verify
- extendedWaitUntil:
    notVisible: "Preview message"
    timeout: 10000
